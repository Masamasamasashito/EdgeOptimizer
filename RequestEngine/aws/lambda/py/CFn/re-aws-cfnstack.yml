# Request Engine Instance config: ../instances_conf/lambda001.env
AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Edge Optimizer - AWS Lambda Request Engine Infrastructure
  Creates Lambda function, IAM roles/policies, Secrets Manager, and GitHub Actions OIDC integration

# ==============================================================================
# PREREQUISITES (Must be created BEFORE deploying this stack)
# ==============================================================================
# 1. Lambda Layer:
#    Create the Lambda Layer manually before deploying this stack.
#    Layer ARN format: arn:aws:{EoServiceServerless}:{EoArea}:{AWSAccountId}:layer:{EoProject}-{EoEnvironment}-{EoServiceServerless}-python-slim-layer:{Version}
#    Example: arn:aws:lambda:ap-northeast-1:123456789012:layer:re-d1-lambda-python-slim-layer:1
#    See: EO_Documents/Manuals/py/LAMBDA_README.md (Section 8-9) for layer creation steps.
#
# 2. GitHub OIDC Provider (IMPORTANT):
#    If your AWS account already has a GitHub OIDC Provider (token.actions.githubusercontent.com),
#    set EoCreateGitHubOIDCProvider to "false" and set ExistingGitHubOIDCProviderArn to its ARN.
#    Check: IAM > Identity providers > token.actions.githubusercontent.com
#
# ==============================================================================
# POST-DEPLOYMENT STEPS
# ==============================================================================
# 1. Update Secrets Manager value:
#    Replace "REPLACE_WITH_N8N_EO_REQUEST_SECRET" with actual N8N_EO_REQUEST_SECRET from EO_Infra_Docker/.env
#
# 2. Create IAM Access Key for n8n (manual creation recommended for security):
#    IAM Console > Users > {EoProject}-{EoEnvironment}-{EoServiceServerless}-{EoAreaShort}-iamu > Security credentials > Create access key
#
# 3. Set GitHub Secrets:
#    Add GitHubActionsDeployRoleArn output value to GitHub repository secrets
#
# ==============================================================================

# ==============================================================================
# Metadata - Parameter Groups for Console Display
# ==============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Naming Convention Parameters"
        Parameters:
          - EoProject
          - EoEnvironment
          - EoAreaShort
          - EoServiceServerless
          - EoServiceSecret
          - EoRequestSecretName
      - Label:
          default: "AWS Account Settings"
        Parameters:
          - AWSAccountId
          - EoArea
      - Label:
          default: "Request Engine Settings"
        Parameters:
          - EoReRuntimeVer
          - EoReLambdaLayerSuffix
          - EoReLambdaLayerVer
          - EoReTimeout
          - EoReMemorySize
      - Label:
          default: "GitHub Actions OIDC Settings"
        Parameters:
          - EoCreateGitHubOIDCProvider
          - ExistingGitHubOIDCProviderArn
          - GitHubOrg
          - EoGitHubRepo
    ParameterLabels:
      EoProject:
        default: "Project Identifier (e.g., re)"
      EoEnvironment:
        default: "Environment Identifier (e.g., d1)"
      EoAreaShort:
        default: "Area (Region) Short Name (e.g., apne1)"
      EoServiceServerless:
        default: "Service (Serverless) Identifier (lambda = AWS Lambda)"
      EoServiceSecret:
        default: "Service (Secret) Identifier (secretsmng = AWS Secrets Manager)"
      EoRequestSecretName:
        default: "Request Secret Name : Default Name is LAMBDA_REQUEST_SECRET (Not Value: REPLACE_WITH_N8N_EO_REQUEST_SECRET)"
      AWSAccountId:
        default: "AWS Account ID"
      EoArea:
        default: "AREA (AWS Region) Identifier (e.g., ap-northeast-1)"
      EoReRuntimeVer:
        default: "RequestEngine RUNTIME VERSION (Lambda) (e.g., python3.14)"
      EoReLambdaLayerSuffix:
        default: "RequestEngine Lambda Layer SUFFIX (must exist before deployment. Example: python-slim-layer)"
      EoReLambdaLayerVer:
        default: "RequestEngine Lambda Layer VERSION (e.g., 1)"
      EoReTimeout:
        default: "RequestEngine Lambda TIMEOUT (min 30s recommended. e.g., 30)"
      EoReMemorySize:
        default: "RequestEngine Lambda MEMORY SIZE (min 128MB recommended. e.g., 128)"
      EoCreateGitHubOIDCProvider:
        default: "Create new GitHub OIDC Provider with this AWS account ID? (if one already exists, set to false.)"
      ExistingGitHubOIDCProviderArn:
        default: "Existing OIDC Provider ARN (required when EoCreateGitHubOIDCProvider is false. e.g., arn:aws:iam::123456789012:oidc-provider/token.actions.githubusercontent.com)"
      GitHubOrg:
        default: "GitHub Organization or Username (e.g., your-github-org)"
      EoGitHubRepo:
        default: "GitHub Repository Name (e.g., your-repo-name)"

# ==============================================================================
# Parameters
# ==============================================================================
Parameters:
  # --- Naming Convention ---

  EoProject:
    Type: String
    Description: "EoProject identifier (re = Request Engine)"
    Default: "re"
    AllowedPattern: "^[a-z0-9]+$"

  EoEnvironment:
    Type: String
    Description: "EoEnvironment identifier (d1 = dev01, p1 = prd01)"
    Default: "d1"
    AllowedPattern: "^[a-z0-9]+$"

  EoAreaShort:
    Type: String
    Description: "Short region name for resource naming"
    Default: "apne1"
    AllowedValues:
      - "apne1"   # ap-northeast-1 (Tokyo)
      - "apne2"   # ap-northeast-2 (Seoul)
      - "apne3"   # ap-northeast-3 (Osaka)
      - "apse1"   # ap-southeast-1 (Singapore)
      - "use1"    # us-east-1 (N. Virginia)
      - "usw2"    # us-west-2 (Oregon)
      - "euw1"    # eu-west-1 (Ireland)

  EoServiceServerless:
    Type: String
    Description: "Service (Serverless) Identifier (lambda = AWS Lambda)"
    Default: "lambda"
    AllowedValues:
      - "lambda"

  EoServiceSecret:
    Type: String
    Description: "Service (Secret) Identifier (secretsmng = AWS Secrets Manager)"
    Default: "secretsmng"
    AllowedValues:
      - "secretsmng"

  EoRequestSecretName:
    Type: String
    Description: "Lambda request secret name"
    Default: "LAMBDA_REQUEST_SECRET"
    AllowedValues:
      - "LAMBDA_REQUEST_SECRET"

  # --- AWS Account ---
  AWSAccountId:
    Type: String
    Description: "AWS Account ID"
    NoEcho: true
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: "Must be a 12-digit AWS Account ID"

  EoArea:
    Type: String
    Description: "RequestEngine AREA (AWS Region) Identifier (e.g., ap-northeast-1)"
    Default: "ap-northeast-1"
    AllowedValues:
      - "ap-northeast-1"
      - "ap-northeast-2"
      - "ap-northeast-3"
      - "ap-southeast-1"
      - "us-east-1"
      - "us-west-2"
      - "eu-west-1"

  # --- Lambda Settings ---
  EoReRuntimeVer:
    Type: String
    Description: "RequestEngine RUNTIME VERSION (e.g., python3.14)"
    Default: "python3.14"
    AllowedValues:
      - "python3.11"
      - "python3.12"
      - "python3.13"
      - "python3.14"
      - "Node.js 20.x"
      - "Node.js 22.x"
      - "Node.js 24.x"

  EoReLambdaLayerSuffix:
    Type: String
    Description: "Lambda Layer Name Suffix (MUST exist before deployment). Example: python-slim-layer"
    Default: "python-slim-layer"

  EoReLambdaLayerVer:
    Type: Number
    Description: "Lambda Layer version number"
    Default: 1
    MinValue: 1

  EoReTimeout:
    Type: Number
    Description: "Lambda timeout in seconds (min 30s recommended)"
    Default: 30
    MinValue: 3
    MaxValue: 900

  EoReMemorySize:
    Type: Number
    Description: "Lambda memory size in MB"
    Default: 128
    AllowedValues:
      - 128
      - 256
      - 512
      - 1024

  # --- GitHub Actions OIDC ---
  GitHubOrg:
    Type: String
    Description: "GitHub organization or username"
    Default: "your-github-org"

  EoGitHubRepo:
    Type: String
    Description: "GitHub repository name"
    Default: "your-repo-name"

  EoCreateGitHubOIDCProvider:
    Type: String
    Description: "Create a new GitHub OIDC Provider? Set to 'false' if one already exists in this AWS account ID."
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  ExistingGitHubOIDCProviderArn:
    Type: String
    Description: "If 'Create new GitHub OIDC Provider with this AWS account ID?' is 'false', provide the existing ARN (e.g., arn:aws:iam::123456789012:oidc-provider/token.actions.githubusercontent.com)."
    Default: ""

# ==============================================================================
# Conditions
# ==============================================================================
Conditions:
  CreateOIDCResource: !Equals
    - !Ref EoCreateGitHubOIDCProvider
    - "true"

# ==============================================================================
# Resources
# ==============================================================================
Resources:

  # ============================================================================
  # CloudWatch Logs - Lambda Log Group (Retention: 1 day)
  # ============================================================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/${EoServiceServerless}/${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}"
      RetentionInDays: 1
      Tags:
        - Key: Name
          Value: !Sub "/aws/${EoServiceServerless}/${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}"
        - Key: Project
          Value: !Ref EoProject
        - Key: EoEnvironment
          Value: !Ref EoEnvironment

  # ============================================================================
  # Secrets Manager - Request Secret for Token Verification
  # ============================================================================
  RequestSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Name: !Sub "${EoProject}-${EoEnvironment}-${EoServiceSecret}-${EoAreaShort}"
      Description: "N8N Request Secret for token verification (LAMBDA_REQUEST_SECRET)"
      # POST-DEPLOYMENT: Update this value with N8N_EO_REQUEST_SECRET from EO_Infra_Docker/.env
      SecretString: !Sub '{"${EoRequestSecretName}": "REPLACE_WITH_N8N_EO_REQUEST_SECRET"}'
      Tags:
        - Key: Name
          Value: !Sub "${EoProject}-${EoEnvironment}-${EoServiceSecret}-${EoAreaShort}"
        - Key: Project
          Value: !Ref EoProject
        - Key: EoEnvironment
          Value: !Ref EoEnvironment

  # ============================================================================
  # IAM - Lambda Execution Role
  # ============================================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RoleName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-role"
      Path: "/service-role/"
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBasicExecutionPolicy
        - !Ref LambdaSecretsAccessPolicy
      Tags:
        - Key: Name
          Value: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-role"

  # --- Lambda Basic Execution Policy (CloudWatch Logs) ---
  LambdaBasicExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ManagedPolicyName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-basic-exec-iamp"
      Path: "/service-role/"
      Description: "Basic execution policy for Lambda (CloudWatch Logs)"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: logs:CreateLogGroup
            Resource: !Sub "arn:aws:logs:${EoArea}:${AWSAccountId}:*"
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !Sub "arn:aws:logs:${EoArea}:${AWSAccountId}:log-group:/aws/${EoServiceServerless}/${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}:*"

  # --- Lambda Secrets Manager Access Policy ---
  LambdaSecretsAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ManagedPolicyName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-role-iamp"
      Path: "/"
      Description: "Policy to allow Lambda to read request secret from Secrets Manager"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowReadRequestSecret
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${EoArea}:${AWSAccountId}:secret:${EoProject}-${EoEnvironment}-${EoServiceSecret}-${EoAreaShort}-*"

  # ============================================================================
  # IAM - n8n Access Key User (for Lambda Invocation)
  # POST-DEPLOYMENT: Create Access Key manually via IAM Console for security
  # ============================================================================
  N8nAccessKeyUser:
    Type: AWS::IAM::User
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      UserName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-iamu"
      Path: "/"
      ManagedPolicyArns:
        - !Ref N8nLambdaInvokePolicy
      Tags:
        - Key: Name
          Value: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-iamu"

  # --- n8n Lambda Invoke Policy ---
  N8nLambdaInvokePolicy:
    Type: AWS::IAM::ManagedPolicy
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ManagedPolicyName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-access-key-iamp"
      Path: "/"
      Description: "Policy for n8n to invoke Lambda function via Access Key"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - !Sub "${EoServiceServerless}:InvokeFunction"
            Resource:
              - !Sub "arn:aws:${EoServiceServerless}:${EoArea}:${AWSAccountId}:function:${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}"
              - !Sub "arn:aws:${EoServiceServerless}:${EoArea}:${AWSAccountId}:function:${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}:*"

  # ============================================================================
  # IAM - GitHub Actions OIDC Provider (created only when CreateOIDCResource is true)
  # When EoCreateGitHubOIDCProvider is "false", use ExistingGitHubOIDCProviderArn instead.
  # Only ONE provider per URL per AWS account ID. Check: IAM > Identity providers > token.actions.githubusercontent.com
  # ============================================================================
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCResource
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Url: "https://token.actions.githubusercontent.com"
      ClientIdList:
        - "sts.amazonaws.com"
      ThumbprintList:
        - "2b18947a6a9fc7764fd8b5fb18a863b0c6dac24f"
      Tags:
        - Key: Name
          Value: !Sub "${EoProject}-ghactions-idp-request-engine-${EoServiceServerless}"

  # --- GitHub Actions Deploy Role ---
  # DependsOn: When CreateOIDCResource is true, OIDC provider must exist before the role so that
  # !Ref GitHubOIDCProvider resolves to a valid ARN. When false, the dependency is skipped.
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    DependsOn: GitHubOIDCProvider
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RoleName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-ghactions-deploy-iamr"
      Path: "/"
      MaxSessionDuration: 3600
      Description: "Role for GitHub Actions to deploy Lambda function"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCResource
                - !Ref GitHubOIDCProvider
                - !Ref ExistingGitHubOIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
              StringLike:
                "token.actions.githubusercontent.com:sub":
                  - !Sub "repo:${GitHubOrg}/${EoGitHubRepo}:*"
      ManagedPolicyArns:
        - !Ref GitHubActionsDeployPolicy
      Tags:
        - Key: Name
          Value: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-ghactions-deploy-iamr"

  # --- GitHub Actions Deploy Policy ---
  GitHubActionsDeployPolicy:
    Type: AWS::IAM::ManagedPolicy
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ManagedPolicyName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}-ghactions-deploy-iamr-iamp"
      Path: "/"
      Description: "Policy for GitHub Actions to deploy Lambda function"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: LambdaDeploymentPermissions
            Effect: Allow
            Action:
              - lambda:GetFunctionConfiguration
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:GetFunction
            Resource: !Sub "arn:aws:${EoServiceServerless}:${EoArea}:${AWSAccountId}:function:${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}"

  # ============================================================================
  # Lambda Function
  # PREREQUISITE: Lambda Layer must exist before deployment
  # ============================================================================
  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FunctionName: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}"
      Description: "Edge Optimizer Request Engine - Lambda"
      Runtime: !Ref EoReRuntimeVer
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: !Ref EoReMemorySize
      Timeout: !Ref EoReTimeout
      Architectures:
        - x86_64
      PackageType: Zip
      # Hello World placeholder - will be replaced by GitHub Actions deployment
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({'message': 'Hello World from Edge Optimizer!'})
              }
      # PREREQUISITE: Create this layer before deploying the stack
      # See: EO_Documents/Manuals/py/LAMBDA_README.md
      Layers:
        - !Sub "arn:aws:${EoServiceServerless}:${EoArea}:${AWSAccountId}:layer:${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoReLambdaLayerSuffix}:${EoReLambdaLayerVer}"
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref LambdaLogGroup
      TracingConfig:
        Mode: PassThrough
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto
      EphemeralStorage:
        Size: 512
      RecursiveLoop: Terminate
      Tags:
        - Key: Name
          Value: !Sub "${EoProject}-${EoEnvironment}-${EoServiceServerless}-${EoAreaShort}"
        - Key: Project
          Value: !Ref EoProject
        - Key: EoEnvironment
          Value: !Ref EoEnvironment

# ==============================================================================
# Outputs
# ==============================================================================
Outputs:
  # --- Lambda ---
  LambdaFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"

  LambdaFunctionName:
    Description: "Lambda Function Name"
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionName"

  LambdaExecutionRoleArn:
    Description: "Lambda Execution Role ARN"
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaExecutionRoleArn"

  LambdaLogGroupName:
    Description: "Lambda Log Group Name"
    Value: !Ref LambdaLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-LambdaLogGroupName"

  # --- Secrets Manager ---
  SecretArn:
    Description: "Secrets Manager Secret ARN (update value after deployment)"
    Value: !Ref RequestSecret
    Export:
      Name: !Sub "${AWS::StackName}-SecretArn"

  # --- n8n Access Key User ---
  N8nAccessKeyUserArn:
    Description: "IAM User ARN for n8n (create Access Key manually via IAM Console)"
    Value: !GetAtt N8nAccessKeyUser.Arn
    Export:
      Name: !Sub "${AWS::StackName}-N8nAccessKeyUserArn"

  N8nAccessKeyUserName:
    Description: "IAM User Name for n8n Access Key creation"
    Value: !Ref N8nAccessKeyUser
    Export:
      Name: !Sub "${AWS::StackName}-N8nAccessKeyUserName"

  # --- GitHub Actions ---
  GitHubActionsDeployRoleArn:
    Description: "GitHub Actions Deploy Role ARN (set this in GitHub Secrets as EO_LAMBDA_DEPLOY_AWS_<REGION>_ROLE_FOR_GITHUB)"
    Value: !GetAtt GitHubActionsDeployRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GitHubActionsDeployRoleArn"

  GitHubOIDCProviderArn:
    Description: "GitHub OIDC Provider ARN (created by stack or existing)"
    Value: !If
      - CreateOIDCResource
      - !Ref GitHubOIDCProvider
      - !Ref ExistingGitHubOIDCProviderArn
    Export:
      Name: !Sub "${AWS::StackName}-GitHubOIDCProviderArn"
